name: Test Rust
on:
  pull_request:
  push:
    branches:
      - main
      - wbfy
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test-rust:
    uses: WillBooster/reusable-workflows/.github/workflows/test-rust.yml@main
    with:
      github_hosted_runner: true
      working_directory: rust
