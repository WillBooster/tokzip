name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  # queue: max keeps every queued run instead of the default "newest pending replaces
  # older pending", so a burst of merges to main still yields one dashboard point per
  # commit. It cannot be combined with cancel-in-progress: true, so superseded PR runs
  # queue too — acceptable, since runs are short once the corpus cache is warm.
  queue: max
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned (via .tool-versions) so runtime upgrades don't masquerade as
          # compress/decompress speed changes in the published series.
          bun-version-file: .tool-versions
      - run: bun install --frozen-lockfile
      - name: Cache benchmark corpus
        uses: actions/cache@v4
        with:
          path: .corpus
          key: corpus-quick-${{ hashFiles('scripts/corpus/**') }}
      - name: Fetch corpus (cache miss or incomplete)
        # The NL fetchers soft-continue on HTTP failures, so "fetch exited 0" does not
        # imply a complete corpus. Validate every expected manifest and fail the step on
        # an incomplete result — that also blocks the cache save (post-if: success()),
        # so the next run re-fetches instead of freezing a partial corpus into CI.
        run: |
          languages='c cpp csharp css dart haskell html java javascript jsp php python ruby rust text typescript zig en-US ja-JP zh-CN zh-TW'
          complete() {
            for language in $languages; do
              [ -s ".corpus/$language/manifest.jsonl" ] || { echo "corpus incomplete: $language"; return 1; }
            done
          }
          if ! complete; then
            bun scripts/corpus/fetchOss.ts --quick
            bun scripts/corpus/fetchNl.ts
            bun scripts/corpus/split.ts
            rm -rf .corpus/.cache
          fi
          complete
      - name: Run benchmark (size + speed + round-trip verification)
        run: bun scripts/bench/bench.ts --speed --json .tmp/bench.json
      - uses: actions/upload-artifact@v4
        # Upload even when the benchmark fails (e.g. a round-trip mismatch) so the
        # structured failure report is available for debugging, not just log text.
        if: ${{ !cancelled() }}
        with:
          name: benchmark-result
          path: .tmp/bench.json
          if-no-files-found: ignore
      - name: Publish result to GitHub Pages branch
        # Only mainline results reach the dashboard: this also excludes workflow_dispatch
        # runs on feature branches, which would race main's publishes (the concurrency
        # group is per-ref). The implicit success() gate still applies: GitHub ANDs
        # `success()` into any `if:` expression that contains no status-check function,
        # so a failed benchmark (e.g. a round-trip mismatch) never publishes.
        if: github.ref == 'refs/heads/main'
        run: bash scripts/bench/publishPages.sh .tmp/bench.json
